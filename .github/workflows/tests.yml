name: Lab 1 Autotests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pytest pytest-cov
      - name: Run tests
        # Робот заходит в папку lab1 и запускает тесты
        run: pytest lab1/test_lab1.py
