name: Lab 1 Autotests and Linting

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov ruff

      - name: Run Linter (Ruff)
        run: ruff check lab1/lab1.py

      - name: Run tests
        run: pytest lab1/test_lab1.py

